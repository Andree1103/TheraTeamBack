spring.application.name=therateam

# Perfil por defecto ("local"): sin activar ningún perfil, apunta a tu Postgres local.
# En Railway, DATABASE_URL/USERNAME/PASSWORD llegan por variables de entorno del servicio
# y sobreescriben estos defaults. Para apuntar en local a la base ya publicada (dev/Railway),
# usa el perfil "dev" -> ver application-dev.properties.
# PostgreSQL (usa variables de entorno en producción; cae a localhost en desarrollo)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/BDClinicaSAAS}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:a1n2d3r4e5e6}
spring.datasource.driver-class-name=org.postgresql.Driver

server.port=${PORT:8080}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
# Desactivado por defecto: en Railway cada query formateada generaba decenas de líneas de log
# y superaba el límite de 500 logs/seg de la plataforma, causando descarte masivo de logs.
# Actívalo puntualmente en local con -Dspring.jpa.show-sql=true si necesitas debuggear SQL.
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Segunda capa de defensa: aunque show-sql esté apagado, evita que alguien suba el nivel
# de estos loggers a DEBUG por error y vuelva a inundar los logs de Railway.
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN
