# Perfil "dev": backend corriendo en tu máquina pero apuntando a la base de datos
# ya publicada en Railway (la misma que usa https://therateamback-production.up.railway.app).
# Actívalo con: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
# Requiere exportar antes las 3 variables de entorno (no tienen default a propósito,
# para no dejar credenciales de producción escritas en el repo):
#   DEV_DATABASE_URL      -> jdbc:postgresql://<host-proxy-railway>:<puerto-proxy>/<db>
#   DEV_DATABASE_USERNAME -> usuario de Postgres en Railway
#   DEV_DATABASE_PASSWORD -> password de Postgres en Railway
# (los 3 valores están en Railway: servicio Postgres -> Variables / Settings -> Networking -> TCP Proxy)

spring.datasource.url=${DEV_DATABASE_URL}
spring.datasource.username=${DEV_DATABASE_USERNAME}
spring.datasource.password=${DEV_DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
